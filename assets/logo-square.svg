<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">

  <!-- ==========================================
       KK FLAWLESS – Square Logo (Social Media)
       Gradient background + car icon + text
       ========================================== -->

  <defs>
    <!-- Gradient matching the provided logo: top-left teal → bottom-right mint green -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a8edea"/>
      <stop offset="55%"  stop-color="#b0efd4"/>
      <stop offset="100%" stop-color="#b8f5c0"/>
    </linearGradient>
    <!-- Rounded rectangle clip -->
    <clipPath id="roundClip">
      <rect width="500" height="500" rx="44" ry="44"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="44" fill="url(#bgGrad)"/>

  <!-- ===== CAR ICON (centered, scaled down) ===== -->
  <g transform="translate(250, 210) scale(0.44) translate(-280, -180)" fill="#1d2b35">

    <!-- Left splash -->
    <path d="M 148 172 C 140 155,120 130,80 112 C 100 114,118 124,132 142 C 114 110,104 78,110 58 C 114 78,124 102,138 124 C 122 88,124 58,142 48 C 140 68,140 98,144 130 Z"/>
    <path d="M 145 168 C 122 150,88 132,56 124 C 80 124,104 136,120 155 Z"/>
    <path d="M 140 176 C 115 170,82 166,56 172 C 82 166,112 168,138 174 Z"/>
    <ellipse cx="30" cy="132" rx="5.5" ry="4.5"/>
    <ellipse cx="50" cy="144" rx="4.5" ry="4"/>
    <ellipse cx="18" cy="148" rx="4" ry="3.5"/>

    <!-- Right splash -->
    <path d="M 412 172 C 420 155,440 130,480 112 C 460 114,442 124,428 142 C 446 110,456 78,450 58 C 446 78,436 102,422 124 C 438 88,436 58,418 48 C 420 68,420 98,416 130 Z"/>
    <path d="M 415 168 C 438 150,472 132,504 124 C 480 124,456 136,440 155 Z"/>
    <path d="M 420 176 C 445 170,478 166,504 172 C 478 166,448 168,422 174 Z"/>
    <ellipse cx="530" cy="132" rx="5.5" ry="4.5"/>
    <ellipse cx="510" cy="144" rx="4.5" ry="4"/>
    <ellipse cx="542" cy="148" rx="4" ry="3.5"/>

    <!-- Water base -->
    <path d="M 112 188 Q 280 182 448 188 L 466 198 Q 280 191 94 198 Z"/>

    <!-- Car body -->
    <path d="M 202 100 C 208 70,228 56,280 54 C 332 56,352 70,358 100 Z"/>
    <path d="M 152 188 L 163 144 L 190 108 L 202 100 L 358 100 L 370 108 L 397 144 L 408 188 Z"/>
    <rect x="146" y="188" width="268" height="12" rx="5"/>
    <path d="M 162 122 C 146 116,138 123,143 132 C 150 136,163 130,162 122 Z"/>
    <path d="M 398 122 C 414 116,422 123,417 132 C 410 136,397 130,398 122 Z"/>

    <!-- Reflection -->
    <path d="M 178 204 Q 280 200 382 204 L 379 212 Q 280 208 181 212 Z"/>
    <path d="M 205 220 Q 280 217 355 220 L 352 227 Q 280 224 208 227 Z"/>
    <path d="M 238 236 Q 280 233 322 236 L 320 241 Q 280 239 240 241 Z"/>
    <ellipse cx="280" cy="249" rx="20" ry="3.5"/>
  </g>

  <!-- Windshield (white) -->
  <g transform="translate(250, 210) scale(0.44) translate(-280, -180)">
    <path d="M 196 136 L 210 104 L 202 100 L 358 100 L 350 104 L 364 136 Z" fill="white" opacity="0.88"/>
  </g>

  <!-- Headlights + Grille -->
  <g transform="translate(250, 210) scale(0.44) translate(-280, -180)">
    <circle cx="193" cy="158" r="21" fill="white"/>
    <circle cx="193" cy="158" r="14" fill="#1d2b35"/>
    <circle cx="225" cy="158" r="15" fill="white"/>
    <circle cx="225" cy="158" r="10" fill="#1d2b35"/>
    <circle cx="367" cy="158" r="21" fill="white"/>
    <circle cx="367" cy="158" r="14" fill="#1d2b35"/>
    <circle cx="335" cy="158" r="15" fill="white"/>
    <circle cx="335" cy="158" r="10" fill="#1d2b35"/>
    <!-- Grille -->
    <rect x="248" y="152" width="64" height="52" rx="9" fill="white"/>
    <rect x="254" y="158" width="52" height="40" rx="6" fill="#1d2b35"/>
    <line x1="270" y1="158" x2="268" y2="198" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="280" y1="158" x2="280" y2="198" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="290" y1="158" x2="292" y2="198" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  </g>


  <!-- ===== TEXT BELOW CAR ===== -->
  <!-- "KK FLAWLESS" -->
  <text
    x="250"
    y="355"
    font-family="'Montserrat', 'Arial Black', 'Impact', sans-serif"
    font-weight="800"
    font-size="58"
    letter-spacing="1.5"
    fill="#1d2b35"
    text-anchor="middle"
  >KK FLAWLESS</text>

  <!-- "AUTOAUFBEREITUNG" -->
  <text
    x="250"
    y="395"
    font-family="'Montserrat', 'Arial', sans-serif"
    font-weight="500"
    font-size="19"
    letter-spacing="8"
    fill="#1d2b35"
    text-anchor="middle"
  >AUTOAUFBEREITUNG</text>

</svg>
