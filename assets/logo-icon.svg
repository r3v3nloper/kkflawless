<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" fill="none">

  <!-- ==========================================
       KK FLAWLESS – Car Splash Icon
       Dark silhouette on transparent background
       ========================================== -->

  <g fill="#1d2b35">

    <!-- ===== LEFT SPLASH WINGS ===== -->
    <!-- Main outer blade (tallest arc, sweeps far upper-left) -->
    <path d="
      M 148 172
      C 140 155, 120 130, 80 112
      C 100 114, 118 124, 132 142
      C 114 110, 104 78, 110 58
      C 114 78, 124 102, 138 124
      C 122 88, 124 58, 142 48
      C 140 68, 140 98, 144 130
      Z
    "/>
    <!-- Secondary blade (sweeps mid-left, slightly lower) -->
    <path d="
      M 145 168
      C 122 150, 88 132, 56 124
      C 80 124, 104 136, 120 155
      Z
    "/>
    <!-- Low connection blade to water base -->
    <path d="
      M 140 176
      C 115 170, 82 166, 56 172
      C 82 166, 112 168, 138 174
      Z
    "/>

    <!-- Left water droplets (3 dots, outer tips) -->
    <ellipse cx="30" cy="132" rx="5.5" ry="4.5"/>
    <ellipse cx="50" cy="144" rx="4.5" ry="4"/>
    <ellipse cx="18" cy="148" rx="4" ry="3.5"/>


    <!-- ===== RIGHT SPLASH WINGS (mirror of left) ===== -->
    <path d="
      M 412 172
      C 420 155, 440 130, 480 112
      C 460 114, 442 124, 428 142
      C 446 110, 456 78, 450 58
      C 446 78, 436 102, 422 124
      C 438 88, 436 58, 418 48
      C 420 68, 420 98, 416 130
      Z
    "/>
    <path d="
      M 415 168
      C 438 150, 472 132, 504 124
      C 480 124, 456 136, 440 155
      Z
    "/>
    <path d="
      M 420 176
      C 445 170, 478 166, 504 172
      C 478 166, 448 168, 422 174
      Z
    "/>

    <!-- Right water droplets -->
    <ellipse cx="530" cy="132" rx="5.5" ry="4.5"/>
    <ellipse cx="510" cy="144" rx="4.5" ry="4"/>
    <ellipse cx="542" cy="148" rx="4" ry="3.5"/>


    <!-- ===== WATER BASE / ROAD SURFACE ===== -->
    <path d="M 112 188 Q 280 182 448 188 L 466 198 Q 280 191 94 198 Z"/>


    <!-- ===== CAR BODY (front view) ===== -->

    <!-- Roof arch -->
    <path d="M 202 100 C 208 70, 228 56, 280 54 C 332 56, 352 70, 358 100 Z"/>

    <!-- Main body trapezoid (A-pillars + sides + bumper) -->
    <path d="
      M 152 188
      L 163 144
      L 190 108
      L 202 100
      L 358 100
      L 370 108
      L 397 144
      L 408 188
      Z
    "/>

    <!-- Lower bumper strip (slightly wider) -->
    <rect x="146" y="188" width="268" height="12" rx="5"/>

    <!-- Left side mirror -->
    <path d="M 162 122 C 146 116, 138 123, 143 132 C 150 136, 163 130, 162 122 Z"/>
    <!-- Right side mirror -->
    <path d="M 398 122 C 414 116, 422 123, 417 132 C 410 136, 397 130, 398 122 Z"/>


    <!-- ===== WATER REFLECTION (below car) ===== -->
    <path d="M 178 204 Q 280 200 382 204 L 379 212 Q 280 208 181 212 Z"/>
    <path d="M 205 220 Q 280 217 355 220 L 352 227 Q 280 224 208 227 Z"/>
    <path d="M 238 236 Q 280 233 322 236 L 320 241 Q 280 239 240 241 Z"/>
    <ellipse cx="280" cy="249" rx="20" ry="3.5"/>

  </g>


  <!-- ===== WINDSHIELD (white cut-out, creates contrast) ===== -->
  <path d="M 196 136 L 210 104 L 202 100 L 358 100 L 350 104 L 364 136 Z"
        fill="white" opacity="0.88"/>


  <!-- ===== HEADLIGHTS ===== -->
  <!-- Left – outer (large) -->
  <circle cx="193" cy="158" r="21" fill="white"/>
  <circle cx="193" cy="158" r="14" fill="#1d2b35"/>
  <!-- Left – inner (smaller) -->
  <circle cx="225" cy="158" r="15" fill="white"/>
  <circle cx="225" cy="158" r="10" fill="#1d2b35"/>

  <!-- Right – outer (large) -->
  <circle cx="367" cy="158" r="21" fill="white"/>
  <circle cx="367" cy="158" r="14" fill="#1d2b35"/>
  <!-- Right – inner (smaller) -->
  <circle cx="335" cy="158" r="15" fill="white"/>
  <circle cx="335" cy="158" r="10" fill="#1d2b35"/>


  <!-- ===== FRONT GRILLE ===== -->
  <!-- Outer white surround -->
  <rect x="248" y="152" width="64" height="52" rx="9" fill="white"/>
  <!-- Dark interior -->
  <rect x="254" y="158" width="52" height="40" rx="6" fill="#1d2b35"/>
  <!-- White grille detail lines -->
  <line x1="270" y1="158" x2="268" y2="198" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="280" y1="158" x2="280" y2="198" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="290" y1="158" x2="292" y2="198" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

</svg>
